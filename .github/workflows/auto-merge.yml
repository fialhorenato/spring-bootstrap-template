name: auto-merge.yml
on:
  workflow_run:
    workflows: [ Pull Request Workflow ]
    types:
      - completed

jobs:
  guard-pr-context:
    permissions: read-all
    runs-on: ubuntu-latest
    outputs:
      pr-number: ${{ steps.resolve-pr.outputs.pr-number }}
    steps:
      - name: Resolve associated pull request
        id: resolve-pr
        uses: actions/github-script@v8
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          script: |
            const pullRequests = context.payload.workflow_run.pull_requests ?? [];

            if (pullRequests.length === 0) {
              core.setFailed('workflow_run completed successfully, but GitHub did not attach any pull request to the event payload.');
              return;
            }

            const prNumber = pullRequests[0].number;
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            if (pullRequest.user?.login !== 'dependabot[bot]') {
              core.setFailed(`Pull request #${prNumber} is from ${pullRequest.user?.login ?? 'an unknown author'}, not Dependabot.`);
              return;
            }

            core.setOutput('pr-number', String(prNumber));
  auto-approval:
    permissions: write-all
    runs-on: ubuntu-latest
    needs: guard-pr-context
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      needs.guard-pr-context.result == 'success'
    steps:
      - name: Approve a PR
        run: gh pr review --approve "$PR_NUMBER"
        env:
          PR_NUMBER: ${{ needs.guard-pr-context.outputs.pr-number }}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
  auto-merge:
    permissions: write-all
    runs-on: ubuntu-latest
    needs:
      - guard-pr-context
      - auto-approval
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      needs.guard-pr-context.result == 'success'
    steps:
      - name: Enable auto-merge for Dependabot PRs
        run: gh pr merge --auto --merge "$PR_NUMBER"
        env:
          PR_NUMBER: ${{ needs.guard-pr-context.outputs.pr-number }}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}

