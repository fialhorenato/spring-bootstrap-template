name: auto-merge.yml
on:
  workflow_run:
    workflows: [ Pull Request Workflow ]
    types:
      - completed

jobs:
  guard-pr-context:
    permissions: read-all
    runs-on: ubuntu-latest
    if: |
      github.actor == 'dependabot[bot]' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    outputs:
      pr-number: ${{ steps.resolve-pr.outputs.pr-number }}
    steps:
      - name: Resolve associated pull request
        id: resolve-pr
        uses: actions/github-script@v8
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          script: |
            const pullRequests = context.payload.workflow_run.pull_requests ?? [];

            if (pullRequests.length === 0) {
              core.setFailed('workflow_run completed successfully, but GitHub did not attach any pull request to the event payload.');
              return;
            }

            core.setOutput('pr-number', String(pullRequests[0].number));
  auto-approval:
    permissions: write-all
    runs-on: ubuntu-latest
    needs: guard-pr-context
    if: |
      needs.guard-pr-context.result == 'success'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
      - name: Approve a PR
        run: gh pr review --approve "$PR_NUMBER"
        env:
          PR_NUMBER: ${{ needs.guard-pr-context.outputs.pr-number }}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
  auto-merge:
    permissions: write-all
    runs-on: ubuntu-latest
    needs:
      - guard-pr-context
      - auto-approval
    if: |
      needs.guard-pr-context.result == 'success'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
      - name: Enable auto-merge for Dependabot PRs
        run: gh pr merge --auto --merge "$PR_NUMBER"
        env:
          PR_NUMBER: ${{ needs.guard-pr-context.outputs.pr-number }}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}

